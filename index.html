<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventoryPro | Cloud-Ready Management</title>
    <!-- Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .stock-row:hover { background-color: #f9fafb; }
        /* Smooth transitions for UI elements */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12">

    <!-- Header Navigation -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2">
                    <div class="bg-blue-600 p-2 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    </div>
                    <span class="text-xl font-bold text-gray-900 tracking-tight">Inventory<span class="text-blue-600">Pro</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleModal('productModal')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Add Item
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Dashboard Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Total Products</p>
                    <p id="statTotalItems" class="text-2xl font-bold text-gray-900">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-yellow-50 text-yellow-600 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Low Stock Alerts</p>
                    <p id="statLowStock" class="text-2xl font-bold text-gray-900">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-green-50 text-green-600 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Inventory Value</p>
                    <p id="statTotalValue" class="text-2xl font-bold text-gray-900">$0.00</p>
                </div>
            </div>
        </div>

        <!-- Inventory List Section -->
        <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <div class="p-4 border-b bg-gray-50/50 sm:flex items-center justify-between space-y-3 sm:space-y-0">
                <h2 class="text-lg font-semibold text-gray-900">Product List</h2>
                <div class="relative max-w-xs w-full">
                    <input type="text" id="searchInput" onkeyup="renderInventory()" placeholder="Search SKU, Name..." class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-medium">
                        <tr>
                            <th class="px-6 py-4">Item Details</th>
                            <th class="px-6 py-4">SKU</th>
                            <th class="px-6 py-4">Category</th>
                            <th class="px-6 py-4">Price</th>
                            <th class="px-6 py-4">Quantity</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList" class="divide-y divide-gray-200">
                        <!-- Items will be injected here via JavaScript -->
                    </tbody>
                </table>
                <div id="emptyState" class="hidden p-12 text-center">
                    <div class="mx-auto w-24 h-24 text-gray-300 mb-4">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    </div>
                    <p class="text-gray-500 text-lg font-medium">No items found.</p>
                    <p class="text-gray-400 text-sm">Add a new item to get started.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Adding/Editing Products -->
    <div id="productModal" class="hidden fixed inset-0 z-[100] overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="toggleModal('productModal')"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            
            <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-gray-900" id="modalTitle">Add New Product</h3>
                        <button onclick="toggleModal('productModal')" class="text-gray-400 hover:text-gray-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <form id="productForm" class="space-y-4">
                        <input type="hidden" id="editIndex" value="-1">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                            <input type="text" id="pName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
                                <input type="text" id="pSKU" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                                <select id="pCategory" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                    <option value="Electronics">Electronics</option>
                                    <option value="Office">Office</option>
                                    <option value="Storage">Storage</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Price ($)</label>
                                <input type="number" id="pPrice" step="0.01" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                                <input type="number" id="pQty" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Min. Stock</label>
                                <input type="number" id="pMin" value="5" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <textarea id="pDesc" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                        </div>
                    </form>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button" onclick="saveProduct()" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">
                        Save Product
                    </button>
                    <button type="button" onclick="toggleModal('productModal')" class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Core state management
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [
            {
                name: "Logistics Pro Box",
                sku: "LOG-001",
                category: "Storage",
                price: 15.99,
                qty: 120,
                minStock: 10,
                desc: "Heavy-duty cardboard storage box.",
                img: "https://images.unsplash.com/photo-1623305466248-b0447de035e8?w=400"
            },
            {
                name: "Digital Inventory Tablet",
                sku: "TEC-202",
                category: "Electronics",
                price: 249.00,
                qty: 4,
                minStock: 5,
                desc: "High-resolution tablet for warehouse management.",
                img: "https://images.unsplash.com/photo-1652955058906-b42fa699fa15?w=400"
            }
        ];

        // Persistence Logic
        function saveToStorage() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
            updateDashboard();
        }

        // Modal Controls
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
            if (modal.classList.contains('hidden')) {
                document.getElementById('productForm').reset();
                document.getElementById('editIndex').value = "-1";
                document.getElementById('modalTitle').innerText = "Add New Product";
            }
        }

        // Dashboard Stats Logic
        function updateDashboard() {
            const totalItems = inventory.length;
            const lowStockCount = inventory.filter(item => item.qty <= item.minStock).length;
            const totalValue = inventory.reduce((sum, item) => sum + (item.price * item.qty), 0);

            document.getElementById('statTotalItems').innerText = totalItems;
            document.getElementById('statLowStock').innerText = lowStockCount;
            document.getElementById('statTotalValue').innerText = '$' + totalValue.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        // CRUD Operations
        function saveProduct() {
            const index = parseInt(document.getElementById('editIndex').value);
            const product = {
                name: document.getElementById('pName').value,
                sku: document.getElementById('pSKU').value,
                category: document.getElementById('pCategory').value,
                price: parseFloat(document.getElementById('pPrice').value),
                qty: parseInt(document.getElementById('pQty').value),
                minStock: parseInt(document.getElementById('pMin').value),
                desc: document.getElementById('pDesc').value,
                img: `https://images.unsplash.com/photo-1675460191018-d0279659b5ce?w=400` // Default placeholder
            };

            if (index === -1) {
                inventory.push(product);
            } else {
                inventory[index] = product;
            }

            saveToStorage();
            renderInventory();
            toggleModal('productModal');
        }

        function deleteProduct(index) {
            if (confirm("Are you sure you want to remove this item from inventory?")) {
                inventory.splice(index, 1);
                saveToStorage();
                renderInventory();
            }
        }

        function editProduct(index) {
            const p = inventory[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('pName').value = p.name;
            document.getElementById('pSKU').value = p.sku;
            document.getElementById('pCategory').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pQty').value = p.qty;
            document.getElementById('pMin').value = p.minStock;
            document.getElementById('pDesc').value = p.desc;
            
            document.getElementById('modalTitle').innerText = "Edit Product";
            toggleModal('productModal');
        }

        // Rendering Engine
        function renderInventory() {
            const list = document.getElementById('inventoryList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventory.filter(p => 
                p.name.toLowerCase().includes(search) || 
                p.sku.toLowerCase().includes(search)
            );

            list.innerHTML = "";
            document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

            filtered.forEach((p, idx) => {
                const statusClass = p.qty <= p.minStock 
                    ? "bg-red-100 text-red-700" 
                    : "bg-green-100 text-green-700";
                
                const statusText = p.qty <= p.minStock ? "Low Stock" : "In Stock";

                list.innerHTML += `
                    <tr class="stock-row transition fade-in">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10">
                                    <img class="h-10 w-10 rounded-lg object-cover bg-gray-100" src="${p.img}" alt="">
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-semibold text-gray-900">${p.name}</div>
                                    <div class="text-xs text-gray-500 truncate w-32">${p.desc}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600 font-mono">${p.sku}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${p.category}</td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">$${p.price.toFixed(2)}</td>
                        <td class="px-6 py-4 text-sm text-gray-900 font-semibold">${p.qty}</td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 text-xs font-bold rounded-full ${statusClass}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button onclick="editProduct(${idx})" class="text-blue-600 hover:text-blue-900 font-medium text-sm">Edit</button>
                            <button onclick="deleteProduct(${idx})" class="text-red-600 hover:text-red-900 font-medium text-sm">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Initial Load
        window.onload = () => {
            updateDashboard();
            renderInventory();
        };
    </script>
</body>
</html>
